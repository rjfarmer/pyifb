name: Linux LLVM clang
on: [push, pull_request]
permissions: {}

jobs:
  linux_llvm:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]    
        python-version: ['3.13', '3.14']    
        toolchain:
          - {compiler: aocc, version: '5.1.0'}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install build wheel pip-tools
          pip-compile -o requirements.txt --extra test --strip-extras
          python -m pip install -r requirements.txt
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build flang clang libflang-dev
    
      - name: Build
        run: |
          ls $(clang -print-file-name=include)
          python -m build
          python -m pip install dist/pyifb*.whl
        env:
          CC: clang
          FC: flang
          
      - name: Test
        # Don't use python -m pytest as that screws up the module loading
        run: |
          pytest -v
        env:
          CC: clang
          FC: flang

