name:  PyPy
on: [push, pull_request]
permissions: {}

jobs:
  pypy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        toolchain:
          - {compiler: gcc, version: 12}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up PyPy
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: 'pypy3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          sudo apt-get install -y libopenblas-dev
          pypy3 -m pip install --upgrade pip==25.2
          pypy3 -m pip install build wheel pip-tools
          pip-compile -o requirements.txt --extra test --strip-extras
          pypy3 -m pip install -r requirements.txt


      - uses: fortran-lang/setup-fortran@2a1b9c55897d827a9dfeb114408f3615e53b2b72 # v1
        id: setup-fortran
        with:
          compiler: ${{ matrix.toolchain.compiler }}
          version: ${{ matrix.toolchain.version }}
    
      - name: Build
        run: |
          pypy3 -m build
          pypy3 -m pip install dist/pyifb*.whl

      - name: Test
        # Don't use python -m pytest as that screws up the module loading
        run: |
          pytest -v
