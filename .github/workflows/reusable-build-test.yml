name: Reusable Build And Test

on:
  workflow_call:
    inputs:
      runs-on:
        required: true
        type: string
      setup-python-version:
        required: true
        type: string
      python-command:
        required: false
        type: string
        default: python
      bootstrap-packages:
        required: false
        type: string
        default: build wheel pip-tools
      requirements-args:
        required: false
        type: string
        default: --extra test --strip-extras
      system-packages:
        required: false
        type: string
        default: ""
      fortran-compiler:
        required: false
        type: string
        default: ""
      fortran-version:
        required: false
        type: string
        default: ""
      use-fortran-outputs:
        required: false
        type: boolean
        default: false
      cc:
        required: false
        type: string
        default: ""
      fc:
        required: false
        type: string
        default: ""
      build-command:
        required: true
        type: string
      test-command:
        required: true
        type: string

permissions: {}

jobs:
  build_and_test:
    runs-on: ${{ inputs.runs-on }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python ${{ inputs.setup-python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ inputs.setup-python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          "${PYTHON_COMMAND}" -m pip install --upgrade pip==25.2
          # shellcheck disable=SC2086
          "${PYTHON_COMMAND}" -m pip install ${BOOTSTRAP_PACKAGES}
          # shellcheck disable=SC2086
          pip-compile -o requirements.txt ${REQUIREMENTS_ARGS}
          "${PYTHON_COMMAND}" -m pip install -r requirements.txt
        env:
          PYTHON_COMMAND: ${{ inputs.python-command }}
          BOOTSTRAP_PACKAGES: ${{ inputs.bootstrap-packages }}
          REQUIREMENTS_ARGS: ${{ inputs.requirements-args }}

      - name: Install system packages
        if: ${{ inputs.system-packages != '' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y "${SYSTEM_PACKAGES}"
        env:
          SYSTEM_PACKAGES: ${{ inputs.system-packages }}

      - uses: fortran-lang/setup-fortran@2a1b9c55897d827a9dfeb114408f3615e53b2b72 # v1.9.0
        if: ${{ inputs.fortran-compiler != '' }}
        id: setup-fortran
        with:
          compiler: ${{ inputs.fortran-compiler }}
          version: ${{ inputs.fortran-version }}

      - name: Resolve compiler environment
        shell: bash
        run: |
          if [[ "${{ inputs.use-fortran-outputs }}" == 'true' ]]; then
            if [[ -n "${STEPS_SETUP_FORTRAN_OUTPUTS_CC}" ]]; then
              echo "CC=${STEPS_SETUP_FORTRAN_OUTPUTS_CC}" >> "$GITHUB_ENV"
            fi
            if [[ -n "${STEPS_SETUP_FORTRAN_OUTPUTS_FC}" ]]; then
              echo "FC=${STEPS_SETUP_FORTRAN_OUTPUTS_FC}" >> "$GITHUB_ENV"
            fi
          else
            if [[ -n "${INPUTS_CC}" ]]; then
              echo "CC=${INPUTS_CC}" >> "$GITHUB_ENV"
            fi
            if [[ -n "${INPUTS_FC}" ]]; then
              echo "FC=${INPUTS_FC}" >> "$GITHUB_ENV"
            fi
          fi
        env:
          STEPS_SETUP_FORTRAN_OUTPUTS_CC: ${{ steps.setup-fortran.outputs.cc }}
          STEPS_SETUP_FORTRAN_OUTPUTS_FC: ${{ steps.setup-fortran.outputs.fc }}
          INPUTS_CC: ${{ inputs.cc }}
          INPUTS_FC: ${{ inputs.fc }}

      - name: Build
        run: ${BUILD_COMMAND}
        env:
          BUILD_COMMAND: ${{ inputs.build-command }}

      - name: Test
        run: ${TEST_COMMAND}
        env:
          TEST_COMMAND: ${{ inputs.test-command }}
